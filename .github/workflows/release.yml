name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build Compute package
        # Bundles src/index.ts with esbuild, then compiles to Wasm with
        # js-compute-runtime, producing bin/main.wasm.
        run: npm run build

      - name: Package Wasm into a Compute tarball
        # `fastly compute pack` wraps a precompiled Wasm binary into the
        # package tar.gz that the deploy API (PUT .../package) expects.
        uses: fastly/compute-actions/setup@v5
      - run: fastly compute pack --wasm-binary bin/main.wasm

      - name: Create GitHub Release and upload package
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/main.wasm
            pkg/monocle-plugin-fastly.tar.gz
          generate_release_notes: true
